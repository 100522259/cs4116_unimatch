<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Bootstrap 5 CSS — loaded FIRST so our custom CSS can override it -->
    <link

      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- Custom Stylesheets (loaded AFTER Bootstrap so they win) -->
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/signup_step1.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container-fluid p-0">
      <div class="row g-0 min-vh-100">
        <!-- LEFT PANEL -->
        <div
          class="col-lg-5 auth-left d-none d-lg-flex flex-column justify-content-center align-items-center"
        >
          <!-- Decorative background icons -->
          <i class="fa-solid fa-heart decor-icon d1"></i>
          <i class="fa-solid fa-star decor-icon d2"></i>
          <i class="fa-solid fa-heart decor-icon d3"></i>
          <i class="fa-solid fa-star decor-icon d4"></i>
          <i class="fa-solid fa-heart decor-icon d5"></i>
          <i class="fa-solid fa-star decor-icon d6"></i>
          <i class="fa-solid fa-heart decor-icon d7"></i>
          <i class="fa-solid fa-star decor-icon d8"></i>

          <!-- Brand -->
          <div class="auth-brand text-center">
            <div class="brand-logo">
              <img src="../images/logo3.png" alt="UniMatch Logo" />
            </div>
            <div class="brand-name">unimatch</div>
            <p class="brand-tagline">
              Find fellow University of Limerick students to match with!
            </p>
            <p class="brand-subtext">
              Sign up now and start connecting with other UL students!
            </p>
          </div>
        </div>

        <!-- RIGHT PANEL -->
        <div
          class="col-lg-7 col-12 auth-right d-flex flex-column align-items-center py-4"
        >
          <div class="auth-card rounded-4 shadow-lg w-100 my-auto">
            <h1 class="fw-bold mb-4">Create Your Account</h1>

            <!-- Error alert — shown via JS when PHP redirects with ?error= -->
            <div
              id="signup-error"
              class="alert alert-danger alert-dismissible fade show d-none"
              role="alert"
            >
              <span id="signup-error-msg"></span>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="alert"
                aria-label="Close"
              ></button>
            </div>

            <form
              id="signup-form"
              action="../signup_step1.php"
              method="POST"
              novalidate
            >
              <!-- First Name + Last Name (Bootstrap 2-col row) -->
              <div class="row g-2 mb-3">
                <div class="col-6">
                  <label for="first_name" class="form-label fw-semibold"
                    >First Name</label
                  >
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="fa-solid fa-user"></i>
                    </span>
                    <input
                      type="text"
                      id="first_name"
                      name="first_name"
                      class="form-control"
                      placeholder="First name"
                      required
                      autocomplete="given-name"
                    />
                  </div>
                </div>
                <div class="col-6">
                  <label for="last_name" class="form-label fw-semibold"
                    >Last Name</label
                  >
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="fa-solid fa-user"></i>
                    </span>
                    <input
                      type="text"
                      id="last_name"
                      name="last_name"
                      class="form-control"
                      placeholder="Last name"
                      required
                      autocomplete="family-name"
                    />
                  </div>
                </div>
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email</label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="fa-solid fa-envelope"></i>
                  </span>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter your UL email"
                    required
                    autocomplete="email"
                  />
                </div>
              </div>

              <!-- Username -->
              <div class="mb-3">
                <label for="username" class="form-label fw-semibold"
                  >Username</label
                >
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="fa-solid fa-at"></i>
                  </span>
                  <input
                    type="text"
                    id="username"
                    name="username"
                    class="form-control"
                    placeholder="Choose a username"
                    required
                    autocomplete="username"
                  />
                </div>
              </div>

              <!-- Password -->
              <div class="mb-3">
                <label for="password" class="form-label fw-semibold"
                  >Password</label
                >
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="fa-solid fa-lock"></i>
                  </span>
                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter your password"
                    required
                    autocomplete="new-password"
                  />
                  <button
                    type="button"
                    class="input-group-text toggle-password"
                    onclick="togglePassword('password', this)"
                    aria-label="Toggle password visibility"
                  >
                    <i class="fa-solid fa-eye"></i>
                  </button>
                </div>
              </div>

              <!-- Confirm Password -->
              <div class="mb-3">
                <label for="confirm_password" class="form-label fw-semibold"
                  >Confirm Password</label
                >
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="fa-solid fa-lock"></i>
                  </span>
                  <input
                    type="password"
                    id="confirm_password"
                    name="confirm_password"
                    class="form-control"
                    placeholder="Confirm your password"
                    required
                    autocomplete="new-password"
                  />
                  <button
                    type="button"
                    class="input-group-text toggle-password"
                    onclick="togglePassword('confirm_password', this)"
                    aria-label="Toggle confirm password visibility"
                  >
                    <i class="fa-solid fa-eye"></i>
                  </button>
                </div>
              </div>

              <!-- Age + Gender (Bootstrap 2-col row) -->
              <div class="row g-2 mb-3">
                <div class="col-6">
                  <label for="age" class="form-label fw-semibold">Age</label>
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="fa-solid fa-cake-candles"></i>
                    </span>
                    <select id="age" name="age" class="form-select" required>
                      <option value="" disabled selected>Select age</option>
                      <option value="17">17</option>
                      <option value="18">18</option>
                      <option value="19">19</option>
                      <option value="20">20</option>
                      <option value="21">21</option>
                      <option value="22">22</option>
                      <option value="23">23</option>
                      <option value="24">24</option>
                      <option value="25">25</option>
                      <option value="26">26</option>
                      <option value="27">27</option>
                      <option value="28">28</option>
                      <option value="29">29</option>
                      <option value="30">30</option>
                    </select>
                  </div>
                </div>
                <div class="col-6">
                  <label for="gender" class="form-label fw-semibold"
                    >Gender</label
                  >
                  <div class="input-group">
                    <span class="input-group-text">
                      <i class="fa-solid fa-venus-mars"></i>
                    </span>
                    <select
                      id="gender"
                      name="gender"
                      class="form-select"
                      required
                    >
                      <option value="" disabled selected>Select gender</option>
                      <option value="male">Male</option>
                      <option value="female">Female</option>
                      <option value="non-binary">Non-binary</option>
                      <option value="prefer_not_to_say">
                        Prefer not to say
                      </option>
                    </select>
                  </div>
                </div>
              </div>

              <button type="submit" class="btn btn-primary btn-lg w-100 mt-1">
                Sign Up
              </button>

              <p class="terms-text small text-muted text-center mt-3">
                By signing up, you agree to our
                <a href="../terms.php">Terms of Service</a> and
                <a href="../privacy.php">Privacy Policy</a>.
              </p>
            </form>

            <p class="auth-alt-text text-center mt-3">
              Already have an account?
              <a href="login.html" class="fw-semibold">Log in</a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      /* ----- Password show / hide ----- */
      function togglePassword(fieldId, btn) {
        const input = document.getElementById(fieldId);
        const icon = btn.querySelector("i");
        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        }
      }

      /* ----- Show error from URL ?error= param (PHP redirect) ----- */
      const params = new URLSearchParams(window.location.search);
      if (params.get("error")) {
        const alertEl = document.getElementById("signup-error");
        document.getElementById("signup-error-msg").textContent =
          decodeURIComponent(params.get("error"));
        alertEl.classList.remove("d-none");
      }
    </script>
  </body>
</html>
