<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMatch - Create Account</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/signup_step1.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

</head>
<body>

    <!-- ===== LEFT PANEL ===== -->
    <div class="auth-left">

        <!-- Decorative background icons -->
        <i class="fa-solid fa-heart  decor-icon d1"></i>
        <i class="fa-solid fa-star   decor-icon d2"></i>
        <i class="fa-solid fa-heart  decor-icon d3"></i>
        <i class="fa-solid fa-star   decor-icon d4"></i>
        <i class="fa-solid fa-heart  decor-icon d5"></i>
        <i class="fa-solid fa-star   decor-icon d6"></i>
        <i class="fa-solid fa-heart  decor-icon d7"></i>
        <i class="fa-solid fa-star   decor-icon d8"></i>

        <!-- Brand -->
        <div class="auth-brand">
            <div class="brand-logo">
                <img src="../images/logo3.png" alt="UniMatch Logo">
            </div>
            <div class="brand-name">unimatch</div>
            <p class="brand-tagline">Find fellow University of Limerick students to match with!</p>
            <p class="brand-subtext">Sign up now and start connecting with other UL students!</p>
        </div>

    </div>

    <!-- ===== RIGHT PANEL ===== -->
    <div class="auth-right">

        <div class="auth-card">

            <h1>Create Your Account</h1>

            <form id="signup-form" action="../signup_step1.php" method="POST" novalidate>

                <!-- First Name + Last Name -->
                <div class="form-row">
                    <div class="form-group">
                        <label for="first_name">First Name</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user input-icon"></i>
                            <input
                                type="text"
                                id="first_name"
                                name="first_name"
                                placeholder="First name"
                                required
                                autocomplete="given-name"
                            >
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="last_name">Last Name</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user input-icon"></i>
                            <input
                                type="text"
                                id="last_name"
                                name="last_name"
                                placeholder="Last name"
                                required
                                autocomplete="family-name"
                            >
                        </div>
                    </div>
                </div>

                <!-- Email -->
                <div class="form-group">
                    <label for="email">Email</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-envelope input-icon"></i>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Enter your UL email"
                            required
                            autocomplete="email"
                        >
                    </div>
                </div>

                <!-- Username -->
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-at input-icon"></i>
                        <input
                            type="text"
                            id="username"
                            name="username"
                            placeholder="Choose a username"
                            required
                            autocomplete="username"
                        >
                    </div>
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            required
                            autocomplete="new-password"
                        >
                        <button
                            type="button"
                            class="toggle-password"
                            onclick="togglePassword('password', this)"
                            aria-label="Toggle password visibility"
                        >
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock input-icon"></i>
                        <input
                            type="password"
                            id="confirm_password"
                            name="confirm_password"
                            placeholder="Confirm your password"
                            required
                            autocomplete="new-password"
                        >
                        <button
                            type="button"
                            class="toggle-password"
                            onclick="togglePassword('confirm_password', this)"
                            aria-label="Toggle confirm password visibility"
                        >
                            <i class="fa-solid fa-eye"></i>
                        </button>
                    </div>
                </div>

                <!-- Age + Gender -->
                <div class="form-row">

                    <!-- Age -->
                    <div class="form-group">
                        <label for="age">Age</label>
                        <div class="select-wrapper">
                            <i class="fa-solid fa-cake-candles input-icon"></i>
                            <select id="age" name="age" required>
                                <option value="" disabled selected>Select age</option>
                                <option value="17">17</option>
                                <option value="18">18</option>
                                <option value="19">19</option>
                                <option value="20">20</option>
                                <option value="21">21</option>
                                <option value="22">22</option>
                                <option value="23">23</option>
                                <option value="24">24</option>
                                <option value="25">25</option>
                                <option value="26">26</option>
                                <option value="27">27</option>
                                <option value="28">28</option>
                                <option value="29">29</option>
                                <option value="30">30</option>
                            </select>
                        </div>
                    </div>

                    <!-- Gender -->
                    <div class="form-group">
                        <label for="gender">Gender</label>
                        <div class="select-wrapper">
                            <i class="fa-solid fa-venus-mars input-icon"></i>
                            <select id="gender" name="gender" required>
                                <option value="" disabled selected>Select gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                                <option value="non-binary">Non-binary</option>
                                <option value="prefer_not_to_say">Prefer not to say</option>
                            </select>
                        </div>
                    </div>

                </div>

                <button type="submit" class="btn-primary">Sign Up</button>

                <p class="terms-text">
                    By signing up, you agree to our
                    <a href="../terms.php">Terms of Service</a> and
                    <a href="../privacy.php">Privacy Policy</a>.
                </p>

            </form>

            <p class="auth-alt-text">
                Already have an account? <a href="login.html">Log in</a>
            </p>

        </div>

    </div>

    <script>
        function togglePassword(fieldId, btn) {
            const input = document.getElementById(fieldId);
            const icon  = btn.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>

</body>
</html>
