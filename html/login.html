<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UniMatch - Log In</title>

    <!-- Bootstrap 5 CSS — loaded first to be overiden by custom stylesheet -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />

    <!-- Custom Stylesheets (loaded AFTER Bootstrap so they win) -->
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/login.css" />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container-fluid p-0">
      <div class="row g-0 min-vh-100">
        <!-- LEFT PANEL -->
        <div
          class="col-lg-5 auth-left d-none d-lg-flex flex-column justify-content-center align-items-center"
        >
          <!-- Decorative background icons -->
          <i class="fa-solid fa-heart decor-icon d1"></i>
          <i class="fa-solid fa-star decor-icon d2"></i>
          <i class="fa-solid fa-heart decor-icon d3"></i>
          <i class="fa-solid fa-star decor-icon d4"></i>
          <i class="fa-solid fa-heart decor-icon d5"></i>
          <i class="fa-solid fa-star decor-icon d6"></i>
          <i class="fa-solid fa-heart decor-icon d7"></i>
          <i class="fa-solid fa-star decor-icon d8"></i>

          <!-- Brand -->
          <div class="auth-brand text-center">
            <div class="brand-logo">
              <img src="../images/logo5.png" alt="UniMatch Logo" />
            </div>
            <div class="brand-name">unimatch</div>
            <p class="brand-tagline">
              Connect with University of Limerick students
            </p>
          </div>
        </div>

        <!-- RIGHT PANEL -->
        <div
          class="col-lg-7 col-12 auth-right d-flex flex-column justify-content-center align-items-center"
        >
          <div class="auth-card rounded-4 shadow-lg w-100">
            <h1 class="fw-bold mb-1">Welcome back to Unimatch!</h1>
            <p class="auth-subtext text-muted mb-4">
              Log in to connect with other University of Limerick students.
            </p>

            <!-- Error alert — shown via JS when PHP redirects with ?error= -->
            <div
              id="login-error"
              class="alert alert-danger alert-dismissible fade show d-none"
              role="alert"
            >
              <span id="login-error-msg"></span>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="alert"
                aria-label="Close"
              ></button>
            </div>

            <form
              id="login-form"
              action="../login.php"
              method="POST"
              novalidate
            >
              <!-- Email -->
              <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email</label>
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="fa-solid fa-envelope"></i>
                  </span>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter your UL email"
                    required
                    autocomplete="email"
                  />
                </div>
              </div>

              <!-- Password -->
              <div class="mb-3">
                <label for="password" class="form-label fw-semibold"
                  >Password</label
                >
                <div class="input-group">
                  <span class="input-group-text">
                    <i class="fa-solid fa-lock"></i>
                  </span>
                  <input
                    type="password"
                    id="password"
                    name="password"
                    class="form-control"
                    placeholder="Enter your password"
                    required
                    autocomplete="current-password"
                  />
                  <button
                    type="button"
                    class="input-group-text toggle-password"
                    onclick="togglePassword('password', this)"
                    aria-label="Toggle password visibility"
                  >
                    <i class="fa-solid fa-eye"></i>
                  </button>
                </div>
              </div>

              <a
                href="../forgot_password.php"
                class="forgot-link d-block text-end mb-3"
              >
                Forgot password?
              </a>

              <button type="submit" class="btn btn-primary btn-lg w-100">
                Log In
              </button>
            </form>

            <p class="auth-alt-text text-center mt-3">
              Don't have an account?
              <a href="signup_step1.html" class="fw-semibold">Sign Up</a>
            </p>
          </div>

          <p class="auth-footer">© 2024 Unimatch</p>
        </div>
      </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      /* ----- Password show / hide ----- */
      function togglePassword(fieldId, btn) {
        const input = document.getElementById(fieldId);
        const icon = btn.querySelector("i");
        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("fa-eye", "fa-eye-slash");
        } else {
          input.type = "password";
          icon.classList.replace("fa-eye-slash", "fa-eye");
        }
      }

      /* ----- Show error from URL ?error= param (PHP redirect) ----- */
      const params = new URLSearchParams(window.location.search);
      if (params.get("error")) {
        const alertEl = document.getElementById("login-error");
        document.getElementById("login-error-msg").textContent =
          decodeURIComponent(params.get("error"));
        alertEl.classList.remove("d-none");
      }
    </script>
  </body>
</html>
