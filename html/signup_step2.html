<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniMatch - Create Your Profile</title>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/signup_step2.css">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

</head>
<body>

    <!-- ===== LEFT PANEL ===== -->
    <div class="auth-left">

        <!-- Decorative background icons -->
        <i class="fa-solid fa-heart  decor-icon d1"></i>
        <i class="fa-solid fa-star   decor-icon d2"></i>
        <i class="fa-solid fa-heart  decor-icon d3"></i>
        <i class="fa-solid fa-star   decor-icon d4"></i>
        <i class="fa-solid fa-heart  decor-icon d5"></i>
        <i class="fa-solid fa-star   decor-icon d6"></i>
        <i class="fa-solid fa-heart  decor-icon d7"></i>
        <i class="fa-solid fa-star   decor-icon d8"></i>

        <!-- Brand -->
        <div class="auth-brand">
            <div class="brand-logo">
                <img src="../images/logo3.png" alt="UniMatch Logo">
            </div>
            <span class="step-badge">Step 2 of 2</span>
            <div class="brand-name">unimatch</div>
            <p class="brand-tagline">Find fellow University of Limerick students to match with!</p>
        </div>

    </div>

    <!-- ===== RIGHT PANEL ===== -->
    <div class="auth-right">

        <div class="auth-card">

            <!-- Heading -->
            <div class="card-heading">
                <h1>Create Your Profile</h1>
                <span class="optional-label">(Optional)</span>
            </div>

            <form
                id="profile-form"
                action="../signup_step2.php"
                method="POST"
                enctype="multipart/form-data"
                novalidate
            >
                <!-- Hidden user_id (populated by PHP session on the server side) -->
                <input type="hidden" name="user_id" id="user_id" value="">

                <!-- ===== PHOTO UPLOAD ===== -->
                <div class="photo-upload-section">
                    <span class="section-label">Upload Main Photo</span>
                    <div class="photo-upload-area">

                        <!-- Circular preview -->
                        <div
                            class="photo-preview-circle"
                            id="photo-preview-circle"
                            onclick="document.getElementById('profile_pic').click()"
                            role="button"
                            aria-label="Click to upload profile photo"
                            tabindex="0"
                        >
                            <i class="fa-solid fa-camera placeholder-icon" id="preview-placeholder-icon"></i>
                            <span class="placeholder-text" id="preview-placeholder-text">Photo</span>
                            <img id="photo-preview-img" src="" alt="Profile photo preview">
                        </div>

                        <div class="upload-btn-wrapper">
                            <button
                                type="button"
                                class="btn-upload"
                                onclick="document.getElementById('profile_pic').click()"
                            >
                                <i class="fa-solid fa-upload"></i>
                                Upload Photo
                            </button>
                            <span class="upload-hint">JPG, PNG or GIF<br>Max 5 MB</span>
                        </div>

                        <!-- Hidden file input -->
                        <input
                            type="file"
                            id="profile_pic"
                            name="profile_pic"
                            accept="image/*"
                        >

                    </div>
                </div>

                <!-- ===== SHORT BIO ===== -->
                <div class="bio-section">
                    <span class="section-label">Short Bio</span>
                    <div class="bio-wrapper">
                        <textarea
                            id="bio"
                            name="bio"
                            placeholder="Write a little about yourself..."
                            maxlength="2500"
                            rows="4"
                            oninput="updateCharCount(this)"
                        ></textarea>
                    </div>
                    <p class="char-count"><span id="char-count">0</span> / 2500</p>
                </div>

                <!-- ===== INTERESTS ===== -->
                <div class="interests-section">
                    <span class="section-label">Interests</span>

                    <!-- 2x2 grid -->
                    <div class="interests-grid">

                        <div class="interest-select-wrapper">
                            <select name="interest1" id="interest1">
                                <option value="" disabled selected>Select your interest</option>
                                <option value="Sports">Sports</option>
                                <option value="Music">Music</option>
                                <option value="Gaming">Gaming</option>
                                <option value="Reading">Reading</option>
                                <option value="Travel">Travel</option>
                                <option value="Cooking">Cooking</option>
                                <option value="Fitness">Fitness</option>
                                <option value="Photography">Photography</option>
                                <option value="Art">Art</option>
                                <option value="Technology">Technology</option>
                                <option value="Movies">Movies</option>
                                <option value="Fashion">Fashion</option>
                                <option value="Nature">Nature</option>
                                <option value="Dance">Dance</option>
                                <option value="Writing">Writing</option>
                            </select>
                        </div>

                        <div class="interest-select-wrapper">
                            <select name="interest2" id="interest2">
                                <option value="" disabled selected>Select your interest</option>
                                <option value="Sports">Sports</option>
                                <option value="Music">Music</option>
                                <option value="Gaming">Gaming</option>
                                <option value="Reading">Reading</option>
                                <option value="Travel">Travel</option>
                                <option value="Cooking">Cooking</option>
                                <option value="Fitness">Fitness</option>
                                <option value="Photography">Photography</option>
                                <option value="Art">Art</option>
                                <option value="Technology">Technology</option>
                                <option value="Movies">Movies</option>
                                <option value="Fashion">Fashion</option>
                                <option value="Nature">Nature</option>
                                <option value="Dance">Dance</option>
                                <option value="Writing">Writing</option>
                            </select>
                        </div>

                        <div class="interest-select-wrapper">
                            <select name="interest3" id="interest3">
                                <option value="" disabled selected>Select your interest</option>
                                <option value="Sports">Sports</option>
                                <option value="Music">Music</option>
                                <option value="Gaming">Gaming</option>
                                <option value="Reading">Reading</option>
                                <option value="Travel">Travel</option>
                                <option value="Cooking">Cooking</option>
                                <option value="Fitness">Fitness</option>
                                <option value="Photography">Photography</option>
                                <option value="Art">Art</option>
                                <option value="Technology">Technology</option>
                                <option value="Movies">Movies</option>
                                <option value="Fashion">Fashion</option>
                                <option value="Nature">Nature</option>
                                <option value="Dance">Dance</option>
                                <option value="Writing">Writing</option>
                            </select>
                        </div>

                        <div class="interest-select-wrapper">
                            <select name="interest4" id="interest4">
                                <option value="" disabled selected>Select your interest</option>
                                <option value="Sports">Sports</option>
                                <option value="Music">Music</option>
                                <option value="Gaming">Gaming</option>
                                <option value="Reading">Reading</option>
                                <option value="Travel">Travel</option>
                                <option value="Cooking">Cooking</option>
                                <option value="Fitness">Fitness</option>
                                <option value="Photography">Photography</option>
                                <option value="Art">Art</option>
                                <option value="Technology">Technology</option>
                                <option value="Movies">Movies</option>
                                <option value="Fashion">Fashion</option>
                                <option value="Nature">Nature</option>
                                <option value="Dance">Dance</option>
                                <option value="Writing">Writing</option>
                            </select>
                        </div>

                    </div>

                    <!-- + Add more reveals 5th interest -->
                    <button
                        type="button"
                        class="add-more-link"
                        id="add-more-btn"
                        onclick="showFifthInterest()"
                    >
                        <i class="fa-solid fa-plus"></i> Add more
                    </button>

                    <!-- 5th interest (hidden until clicked) -->
                    <div class="interest-extra" id="interest5-wrapper">
                        <div class="interest-select-wrapper">
                            <select name="interest5" id="interest5">
                                <option value="" disabled selected>Select your interest</option>
                                <option value="Sports">Sports</option>
                                <option value="Music">Music</option>
                                <option value="Gaming">Gaming</option>
                                <option value="Reading">Reading</option>
                                <option value="Travel">Travel</option>
                                <option value="Cooking">Cooking</option>
                                <option value="Fitness">Fitness</option>
                                <option value="Photography">Photography</option>
                                <option value="Art">Art</option>
                                <option value="Technology">Technology</option>
                                <option value="Movies">Movies</option>
                                <option value="Fashion">Fashion</option>
                                <option value="Nature">Nature</option>
                                <option value="Dance">Dance</option>
                                <option value="Writing">Writing</option>
                            </select>
                        </div>
                    </div>

                </div>

                <!-- ===== BOTTOM BUTTONS ===== -->
                <div class="btn-row">
                    <a href="login.html" class="btn-skip">Skip</a>
                    <button type="submit" class="btn-next">Next</button>
                </div>

            </form>

        </div>

    </div>

    <script>
        /* ---- Photo preview ---- */
        document.getElementById('profile_pic').addEventListener('change', function () {
            const file = this.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                const img  = document.getElementById('photo-preview-img');
                const icon = document.getElementById('preview-placeholder-icon');
                const text = document.getElementById('preview-placeholder-text');

                img.src            = e.target.result;
                img.style.display  = 'block';
                icon.style.display = 'none';
                text.style.display = 'none';
            };
            reader.readAsDataURL(file);
        });

        /* ---- Bio char counter ---- */
        function updateCharCount(textarea) {
            document.getElementById('char-count').textContent = textarea.value.length;
        }

        /* ---- Reveal 5th interest ---- */
        function showFifthInterest() {
            document.getElementById('interest5-wrapper').classList.add('visible');
            document.getElementById('add-more-btn').style.display = 'none';
        }
    </script>

</body>
</html>
