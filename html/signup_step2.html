                    <img

                      src=""
                      alt="Profile photo preview"
                    />

                  <div class="upload-btn-wrapper">
                    <button
                      type="button"
                      class="btn btn-upload"
                      onclick="document.getElementById('profile_pic').click()"
                    >

                    </button>
                    <span class="upload-hint text-muted small"
                      >JPG, PNG or GIF<br />Max 5 MB</span
                    >
                  </div>

                  <!-- Hidden file input -->
                  <input
                    type="file"
                    id="profile_pic"
                    name="profile_pic"
                    accept="image/*"
                  />
                </div>
              </div>

              <!-- SHORT BIO -->
              <div class="bio-section">
                <span class="section-label">Short Bio</span>
                <div class="bio-wrapper">
                  <textarea
                    id="bio"
                    name="bio"
                    class="form-control"
                    placeholder="Write a little about yourself..."
                    maxlength="2500"

    <script>
      /* ---- Photo preview ---- */
      document
        .getElementById("profile_pic")
        .addEventListener("change", function () {
          const file = this.files[0];
          if (!file) return;

          const reader = new FileReader();
          reader.onload = function (e) {
            const img = document.getElementById("photo-preview-img");
            const icon = document.getElementById("preview-placeholder-icon");
            const text = document.getElementById("preview-placeholder-text");

            img.src = e.target.result;
            img.style.display = "block";
            icon.style.display = "none";
            text.style.display = "none";
          };
          reader.readAsDataURL(file);
        });

      /* ---- Bio char counter ---- */
      function updateCharCount(textarea) {
        document.getElementById("char-count").textContent =
          textarea.value.length;
      }

      /* ---- Reveal 5th interest ---- */
      function showFifthInterest() {
        document.getElementById("interest5-wrapper").classList.add("visible");
        document.getElementById("add-more-btn").style.display = "none";
      }
    </script>
